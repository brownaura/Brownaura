<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brown Aura Fragrances</title>
<style>
body{font-family:Arial, Helvetica, sans-serif;margin:0;background:#0f0f0f;color:white}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:#111}
.logo{font-size:24px;font-weight:bold;color:#d4af37}
nav a{margin:0 15px;color:white;text-decoration:none}
.hero{height:60vh;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=1600');background-size:cover;display:flex;align-items:center;justify-content:center;text-align:center}
.hero h1{font-size:48px}
.hero p{font-size:20px;color:#ccc}
.shop{padding:60px 40px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px}
.card{background:#1a1a1a;padding:20px;border-radius:10px;text-align:center}
.card img{width:100%;border-radius:8px}
.price{color:#d4af37;font-weight:bold}
button{background:#d4af37;border:none;padding:10px 18px;margin-top:10px;border-radius:6px;cursor:pointer}
footer{text-align:center;padding:30px;background:#111;margin-top:40px;color:#888}
</style>
</head>
<body>

<header>
<div class="logo">Brown Aura</div>
<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#">Decants</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<div>
<h1>Brown Aura Fragrances</h1>
<p>Discover Your Signature Scent</p>
<button>Shop Now</button>
</div>
</section>

<section class="shop" id="shop">
<h2>Featured Fragrances</h2>
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de?q=80&w=600">
<h3>Dior Sauvage</h3>
<p class="price">$120</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=600">
<h3>YSL Babycat</h3>
<p class="price">$250</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad?q=80&w=600">
<h3>Creed Aventus</h3>
<p class="price">$340</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?q=80&w=600">
<h3>Tom Ford Oud Wood</h3>
<p class="price">$295</p>
<button>Buy</button>
</div>

</div>
</section>

<footer>
© 2026 Brown Aura Fragrances
</footer>

</body>
</html>
