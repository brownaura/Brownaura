<!DOCTYPE html>
<html>
<head>
<title>Brown Aura Fragrances</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:black;
}

.logo{
color:gold;
font-size:22px;
font-weight:bold;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.hero{
height:70vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1592945403244-b3fbafd7f539");
background-size:cover;
}

.hero h1{
font-size:50px;
}

button{
background:gold;
border:none;
padding:12px 20px;
margin-top:10px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:50px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
}

.price{
color:gold;
font-weight:bold;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:gold;
color:black;
padding:10px;
border-radius:6px;
}

footer{
text-align:center;
padding:30px;
background:black;
}

</style>

</head>

<body>

<div class="cart">Cart: <span id="cart">0</span></div>

<header>

<div class="logo">Brown Aura</div>

<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Brown Aura Fragrances</h1>
<p>Discover Your Signature Scent</p>

<button onclick="scrollShop()">Shop Now</button>

</section>

<section class="products" id="shop">

<div class="card">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de">
<h3>Dior Sauvage</h3>
<p class="price">$120</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">
<h3>YSL Babycat</h3>
<p class="price">$250</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<h3>Creed Aventus</h3>
<p class="price">$340</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb">
<h3>Tom Ford Oud Wood</h3>
<p class="price">$295</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</section>

<footer>

© 2026 Brown Aura Fragrances

</footer>

<script>

let cart = 0

function addCart(){
cart++
document.getElementById("cart").innerText = cart
}

function scrollShop(){
document.getElementById("shop").scrollIntoView({behavior:"smooth"})
}

</script>

</body>
</html>
